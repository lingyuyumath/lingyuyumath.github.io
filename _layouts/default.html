<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="/assets/style.css">
  <title>{{ page.title }}</title>

  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <!-- 可选：你可以在这里加全局 CSS -->
  <style>
    /* 图片容器右侧固定 */
    .images-container {
      position: fixed;        /* 固定在屏幕上 */
      top: 100px;             /* 离顶部距离，可调整 */
      right: 20px;            /* 离右侧距离 */
      display: flex;
      flex-direction: column; /* 竖直排列 */
      gap: 20px;              /* 图片间距 */
      max-width: 200px;       /* 控制图片最大宽度 */
    }

    .images-container img {
      width: 100%;            /* 填满容器宽度 */
      display: block;
    }
  </style>
</head>

<body>

<h1>Lingyu Yu</h1>

<nav>
  <a href="/">Home</a> |
  <a href="/research">Research</a> |
  <a href="/notes">Notes</a> |
  <a href="/cv">CV</a>
</nav>

<hr>

{{ content }}

<!-- 只在 Home 页面显示右侧图片 -->
{% if page.home %}
<div class="images-container">
  <img src="/images/knot1.png" alt="Knot 1">
  <img src="/images/knot2.png" alt="Knot 2">
</div>
{% endif %}

</body>
</html>
